<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' file:; style-src 'self' 'unsafe-inline'" />
  <title>Damon</title>
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="brand">Damon<span>ADE</span></div>
      <div id="teams"></div>
      <button id="add-team" class="ghost-btn">+ New team</button>
    </aside>

    <main id="main">
      <div id="header">
        <div id="tabstrip">
          <div id="tabs"></div>
          <button id="new-tab" class="icon-btn" title="New tab (Ctrl+T)">+</button>
        </div>
        <div id="toolbar">
          <button id="btn-model" class="tool-btn" title="Switch model (/model)"></button>
          <button id="btn-account" class="tool-btn" title="Accounts"></button>
          <button id="btn-skill" class="tool-btn" title="Run a skill">/skill</button>
          <button id="btn-remote" class="tool-btn" title="Remote control (Ctrl+R)">&#128241;</button>
          <button id="btn-autoswitch" class="tool-btn" title="Auto-switch accounts">A&#8644;</button>
          <button id="btn-dashboard" class="tool-btn" title="Token stats dashboard">Tokens</button>
          <div class="spacer"></div>
          <button id="btn-zoom-out" class="tool-btn narrow" title="Smaller font">&#8722;</button>
          <span id="zoom-label" class="tool-label"></span>
          <button id="btn-zoom-in" class="tool-btn narrow" title="Larger font">+</button>
          <span class="tool-sep"></span>
          <button id="btn-settings" class="tool-btn narrow" title="Settings">&#9881;</button>
          <button id="btn-history" class="tool-btn" title="Reopen a closed session (Ctrl+Shift+Y)">&#8635; History</button>
          <button id="btn-reload" class="tool-btn" title="Reload this session (same conversation)">Reload</button>
          <button id="btn-restart" class="tool-btn" title="Restart: close and start a fresh session">Restart</button>
          <button id="toggle-drawer" class="tool-btn" title="Agent files">Files</button>
        </div>
      </div>
      <div id="content">
        <div id="terminals"></div>
        <div id="export-fab">
          <button id="fab-export-last" class="fab-btn" title="Save Claude's last message as .md in the agent repo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M12 18v-6"/><path d="m9 15 3 3 3-3"/></svg>
          </button>
          <button id="fab-export-full" class="fab-btn" title="Save the whole conversation as .md in the agent repo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-3a2 2 0 0 1-2-2V2"/><path d="M9 18a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h7l5 5v9a2 2 0 0 1-2 2Z"/><path d="M3 7.6v12.8A1.6 1.6 0 0 0 4.6 22h9.8"/></svg>
          </button>
        </div>
        <div id="picker" class="hidden">
          <h2>Choose a model</h2>
          <p class="muted">Claude and Codex run on your subscriptions. Open-source models run through OpenRouter.</p>
          <div id="model-list"></div>
          <form id="or-key-form" class="hidden">
            <p>Enter your OpenRouter API key (stored encrypted on this machine):</p>
            <input id="or-key-input" type="password" placeholder="sk-or-..." autocomplete="off" />
            <button type="submit">Save and launch</button>
          </form>
        </div>
        <div id="empty" class="hidden">
          <div id="empty-card">
            <h1 id="empty-title"></h1>
            <p id="empty-sub" class="muted"></p>
            <button id="empty-action"></button>
          </div>
        </div>
        <div id="history-drawer" class="hidden"></div>
      </div>
    </main>

    <aside id="drawer" class="hidden">
      <div id="drawer-head">Agent files</div>
      <ul id="file-list"></ul>
      <div id="file-view" class="hidden">
        <div id="file-name" class="muted"></div>
        <textarea id="file-content" spellcheck="false"></textarea>
        <button id="file-save">Save</button>
      </div>
    </aside>
  </div>

  <div id="popup-layer"></div>
  <div id="toasts"></div>

  <dialog id="team-dialog">
    <form method="dialog" class="modal-form">
      <h2>New team</h2>
      <label>Name <input id="team-name" required autocomplete="off" /></label>
      <div class="photo-row">
        <div id="team-photo-preview" class="avatar large"></div>
        <button type="button" id="team-photo-btn" class="ghost-btn">Choose photo</button>
      </div>
      <div class="modal-actions">
        <button value="cancel" formnovalidate class="ghost-btn">Cancel</button>
        <button id="team-create" value="ok">Create team</button>
      </div>
    </form>
  </dialog>

  <dialog id="agent-dialog">
    <form method="dialog" class="modal-form">
      <h2>New agent</h2>
      <label>Name <input id="agent-name" required autocomplete="off" /></label>
      <div class="photo-row">
        <div id="agent-photo-preview" class="avatar large"></div>
        <button type="button" id="agent-photo-btn" class="ghost-btn">Choose photo</button>
      </div>
      <fieldset>
        <legend>Workspace</legend>
        <label class="radio"><input type="radio" name="repo-mode" value="new" checked /> New empty repo (created under ~/.ade)</label>
        <label class="radio"><input type="radio" name="repo-mode" value="clone" /> Clone an existing GitHub repo</label>
        <input id="agent-repo-url" placeholder="https://github.com/user/repo.git" class="hidden" autocomplete="off" />
      </fieldset>
      <div class="modal-actions">
        <button value="cancel" formnovalidate class="ghost-btn">Cancel</button>
        <button id="agent-create" value="ok">Create agent</button>
      </div>
    </form>
  </dialog>

  <dialog id="settings-dialog">
    <form method="dialog" class="modal-form" id="settings-form">
      <h2>Settings</h2>
      <div class="settings-grid">
        <label>Extra Claude args <input id="set-args" autocomplete="off" placeholder="--verbose" /></label>
        <label>Startup commands (one per line, sent to every new Claude session)
          <textarea id="set-startup" rows="3" spellcheck="false"></textarea></label>
        <label>Font size <input id="set-fontsize" type="number" min="8" max="40" /></label>
        <label class="radio"><input id="set-bell" type="checkbox" /> Notify on terminal bell</label>
        <label class="radio"><input id="set-probe" type="checkbox" /> Probe live usage % via the Anthropic API</label>
        <label>Python path (token dashboard; empty = autodetect) <input id="set-python" autocomplete="off" /></label>
        <label>Usage scrape regex (empty = default) <input id="set-usagere" autocomplete="off" /></label>
        <label>Default browser for account logins
          <select id="set-browser"></select></label>
      </div>
      <div id="settings-accounts"></div>
      <div class="modal-actions">
        <button value="cancel" formnovalidate class="ghost-btn">Cancel</button>
        <button value="ok">Save</button>
      </div>
    </form>
  </dialog>

  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../node_modules/@xterm/addon-unicode11/lib/addon-unicode11.js"></script>
  <script src="../node_modules/@xterm/addon-webgl/lib/addon-webgl.js"></script>
  <script src="app.js"></script>
</body>
</html>
